<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--add tailwind css and daisyui cdn link-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--add google geist font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <!-- add font awesome cdn link-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!--link css file-->
    <link rel="stylesheet" href="./style/styles.css" />
    <title>GitHub Issues Tracker || SingIn Page</title>
  </head>
  <body class="bg-[#F8FAFC]">
    <section class="w-110 pt-15 mx-auto bg-white space-y-3 shadow-sm">
      <div class="text-center space-y-3">
        <img src="./assets/github-logo.png" alt="" class="mx-auto" />
        <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <div class="mx-10">
        <fieldset class="fieldset bg-white rounded-box w-full p-4 bg-">
          <label class="label font-bold text-black">Username</label>
          <input
            id="user-name"
            value="admin"
            type="text"
            class="input"
            placeholder="Enter Username"
          />
          <span class="text-[#4A00FF] text-[14px]">Default: admin</span>

          <label class="label font-bold text-black">Password</label>
          <input
            id="user-password"
            value="admin123"
            type="password"
            class="input"
            placeholder="Enter Password"
          />
          <span class="text-[#4A00FF] text-[14px]">Default: admin123</span>
          <button id="sing-in-btn" class="btn btn-neutral mt-4 bg-[#4A00FF]">
            Sign In
          </button>
        </fieldset>
      </div>
      <div>
        <div class="relative flex py-5 items-center mx-5">
          <div class="border-t flex-grow border-gray-400"></div>
          <span class="flex-shrink mx-4 text-gray-400 font-bold">Or</span>
          <div class="border-t flex-grow border-gray-400"></div>
        </div>
        <div class="text-center">
          <span class="">Demo Credentials:</span>
          <div class="bg-gray-100 mx-10 p-5 mt-4 rounded">
            <p class="text-[16px]">
              <span class="font-semibold">Username</span>:
              <span>admin</span>
            </p>
            <p class="text-[16px]">
              <span class="font-semibold">Password</span>:
              <span>admin123</span>
            </p>
          </div>
        </div>
      </div>
    </section>

    <script src="./script/index.js"></script>
  </body>
</html>
